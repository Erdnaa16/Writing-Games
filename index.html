<!DOCTYPE html>
<html>
<head>
  <title>Ali's Japan Adventure Deluxe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin: 0;
      overflow: hidden;
      background: linear-gradient(270deg, #74ebd5, #acb6e5, #ff9a9e);
      background-size: 600% 600%;
      animation: gradientBG 10s ease infinite;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .box {
      background: rgba(255,255,255,0.95);
      padding: 15px;
      border-radius: 15px;
      width: 90%;
      max-width: 420px;
      margin: 60px auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      position: relative;
      z-index: 2;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      background-color: #ff7675;
      color: white;
      cursor: pointer;
      width: 90%;
    }

    input {
      padding: 10px;
      width: 90%;
      margin-top: 10px;
    }

    /* Floating emojis */
    .emoji {
      position: absolute;
      font-size: 24px;
      animation: floatUp 8s linear infinite;
      opacity: 0.7;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(-10vh); }
    }
  </style>
</head>

<body>

<h1 style="color:white;">✈️ Ali’s Japan Adventure 🇯🇵</h1>

<div class="box">

  <!-- STORY -->
  <div id="storySection">
    <h3>📖 Read the Story</h3>
    <p>
      Ali is very excited. He is going to Japan next week with his family. 
      He is going to visit Tokyo Tower and Mount Fuji. 
      He is going to try sushi and ramen. 
      He is going to take many pictures and buy souvenirs. 
      He is going to feel very happy.
    </p>
    <button onclick="startGame()">Start Game</button>
  </div>

  <!-- GAME -->
  <div id="gameSection" style="display:none;">
    <p id="question"></p>

    <input type="text" id="writing" placeholder="Use 'be going to'">

    <button onclick="checkAnswer()">Submit</button>
    <button onclick="nextQuestion()">Next</button>

    <p id="feedback"></p>
    <p id="score">Score: 0</p>
  </div>

</div>

<!-- 🎵 Background Music -->
<audio id="bgMusic" autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3" type="audio/mpeg">
</audio>

<script>
let questions = [
  {text: "Where is Ali going?", answer: "japan"},
  {text: "When is he going?", answer: "next week"},
  {text: "What is he going to visit?", answer: "tokyo"},
  {text: "What food is he going to try?", answer: "sushi"},
  {text: "How is he going to feel?", answer: "happy"}
];

let index = 0;
let score = 0;

function startGame() {
  document.getElementById("storySection").style.display = "none";
  document.getElementById("gameSection").style.display = "block";
  nextQuestion();
}

function nextQuestion() {
  if (index >= questions.length) {
    document.getElementById("question").innerText = "🎉 Game Over!";
    return;
  }

  document.getElementById("question").innerText = questions[index].text;
  document.getElementById("writing").value = "";
  document.getElementById("feedback").innerText = "";
  index++;
}

function checkAnswer() {
  let ans = document.getElementById("writing").value.toLowerCase();
  let correct = questions[index - 1].answer;

  if (ans.includes("going to") && ans.includes(correct)) {
    score++;
    document.getElementById("feedback").innerText = "✅ Excellent!";
  } else {
    document.getElementById("feedback").innerText = "❌ Use 'going to'!";
  }

  document.getElementById("score").innerText = "Score: " + score;
}

/* 🎨 Floating Emojis Generator */
function createEmoji() {
  let emojis = ["✈️","🌸","🇯🇵","🗾","🍣"];
  let emoji = document.createElement("div");
  emoji.className = "emoji";
  emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];

  emoji.style.left = Math.random() * 100 + "vw";
  emoji.style.fontSize = (20 + Math.random() * 20) + "px";

  document.body.appendChild(emoji);

  setTimeout(() => {
    emoji.remove();
  }, 8000);
}

setInterval(createEmoji, 1000);
</script>

</body>
</html>
