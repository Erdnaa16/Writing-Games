<!DOCTYPE html>
<html>
<head>
  <title>Ali's Japan Adventure</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #a1c4fd, #c2e9fb);
      text-align: center;
      padding: 20px;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 450px;
      margin: auto;
      box-shadow: 0 0 15px gray;
    }
    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
      border-radius: 8px;
    }
    input {
      padding: 8px;
      width: 80%;
    }
  </style>
</head>
<body>

<h1>✈️ Ali’s Japan Adventure</h1>

<div class="box">
  <p id="story">Click Start to begin!</p>

  <div id="options"></div>

  <input type="text" id="writing" placeholder="Type your sentence here..."><br><br>

  <button onclick="checkAnswer()">Submit</button>
  <button onclick="nextQuestion()">Next</button>

  <p id="feedback"></p>
  <p id="score">Score: 0</p>
  <p id="timer">Time: 30</p>
</div>

<script>
let questions = [
  {
    text: "Where is Ali going?",
    options: ["Korea", "Japan", "Thailand"],
    answer: "Japan",
    writing: "He is going to Japan"
  },
  {
    text: "When is he going?",
    options: ["Yesterday", "Next week", "Last year"],
    answer: "Next week",
    writing: "He is going next week"
  },
  {
    text: "What is he going to do?",
    options: ["Sleep all day", "Visit places", "Stay home"],
    answer: "Visit places",
    writing: "He is going to visit famous places"
  },
  {
    text: "What food is he going to try?",
    options: ["Pizza", "Sushi", "Burger"],
    answer: "Sushi",
    writing: "He is going to try sushi"
  }
];

let index = 0;
let score = 0;
let time = 30;
let timer;

function startTimer() {
  clearInterval(timer);
  time = 30;
  document.getElementById("timer").innerText = "Time: " + time;

  timer = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = "Time: " + time;

    if (time == 0) {
      clearInterval(timer);
      document.getElementById("feedback").innerText = "⏰ Time's up!";
    }
  }, 1000);
}

function nextQuestion() {
  if (index >= questions.length) {
    document.getElementById("story").innerText = "🎉 Game Over!";
    document.getElementById("options").innerHTML = "";
    return;
  }

  let q = questions[index];
  document.getElementById("story").innerText = q.text;

  let optionsHTML = "";
  q.options.forEach(opt => {
    optionsHTML += `<button onclick="selectOption('${opt}')">${opt}</button>`;
  });

  document.getElementById("options").innerHTML = optionsHTML;
  document.getElementById("writing").value = "";
  document.getElementById("feedback").innerText = "";

  startTimer();
  index++;
}

let selected = "";

function selectOption(opt) {
  selected = opt;
}

function checkAnswer() {
  let q = questions[index - 1];
  let writing = document.getElementById("writing").value.toLowerCase();

  if (selected === q.answer && writing.includes("going")) {
    score++;
    document.getElementById("feedback").innerText = "✅ Correct!";
  } else {
    document.getElementById("feedback").innerText = "❌ Try again!";
  }

  document.getElementById("score").innerText = "Score: " + score;
}
</script>

</body>
</html>
